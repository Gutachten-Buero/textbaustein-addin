      { id:142, titel:"Norm. Tempo · Führung + Akkord + Lenken + Nacht + Exp.", text:"Ausgeschlossen sind:\n• Mehr als nur normales Arbeitstempo\n• Arbeiten mit Führungsaufgaben\n• Akkordarbeit\n• Das Lenken von Kraftfahrzeugen, Fahrrädern, Elektrorollern, Baumaschinen sowie vergleichbaren Fahrzeugen im beruflichen Kontext\n• Nachtarbeit (22:00–6:00)\n• Tätigkeiten mit erhöhter Unfall- oder Verletzungsgefahr (exponierte Arbeit)" },
      { id:136, titel:"Ausschlüsse – normales Tempo + Zwangsstörung (Körperflüssigkeiten, Toiletten, Müll)", text:"Ausgeschlossen sind:\n• Mehr als nur normales Arbeitstempo\n• Arbeiten bei großen Menschenansammlungen wie z. B. bei einem Festival\n• Arbeiten mit Führungsaufgaben\n• Akkordarbeit\n• Nachtarbeit (22:00–6:00)\n• Arbeiten mit unmittelbarem oder sehr wahrscheinlichem Kontakt zu Körperflüssigkeiten sind nicht möglich.\n• Arbeiten sind nicht möglich, wenn die Nutzung öffentlicher Toiletten zwingend vorausgesetzt ist und keine private oder betriebliche Sanitäranlage zur Verfügung steht.\n• Tätigkeiten, die überwiegend mit dem Umgang mit Müll oder Abfall einhergehen, einschließlich Sammeln, Sortieren, Transportieren oder Entsorgen von Abfällen, sind nicht möglich." },

      { id:130, titel:"Zustand besteht mindestens seit Antragstellung", text:"Der Zustand besteht mindestens seit Antragstellung." },
      { id:131, titel:"Zustand besteht mindestens seit Entziehung der Leistung", text:"Der Zustand besteht mindestens seit Entziehung der Leistung." },
      { id:201, titel:"Verbesserung seit Vorgutachten – kalkülsrelevant", text:"Es ergeben sich im Vergleich zum [DATUM] kalkülsrelevante Verbesserungen im Sinne einer Besserung der [SYMPTOMATIK]. In der Zusammenschau der hier vorgenommenen Untersuchungen einschließlich Beschwerdevalidierung und Laboruntersuchung ergeben sich im Rahmen der Plausibilitätsprüfung der durchgeführten Begutachtung relevante Verbesserungen im Bereich des Affekts, der Schwingungsfähigkeit und der Stimmung." },
      { id:202, titel:"Wesentliche Besserung seit Leistungsgewährung", text:"Seit der rechtskräftigen Gewährung vom [DATUM] hat sich das Leistungskalkül wesentlich gebessert." },
      { id:203, titel:"Frühere absolute Arbeitsunfähigkeit – kein Leistungskalkül erstellbar", text:"Zum Zeitpunkt des Gewährungsgutachtens konnte kein Restleistungskalkül erstellt werden. Aufgrund der Komplexität des damaligen Beschwerdebildes kann auch rückwirkend kein Leistungskalkül erstellt werden." },
      { id:204, titel:"Gewährung nicht aus psychiatrischen Gründen", text:"Die Gewährung von Rehabilitationsgeld erfolgte nicht aus psychiatrischen Gründen." },
      { id:301, titel:"Keine Verschlechterung in 18 Monaten (Standardsatz)", text:"Derzeit bestehen keine Hinweise darauf, dass bei Einhaltung der Mitwirkungspflichten durch die klagende Partei in absehbarer Zeit (innerhalb der nächsten 18 Monate) mit einer kalkülsrelevanten Verschlechterung des Gesundheitszustandes (fachspezifisch) zu rechnen wäre. Regelmäßige fachärztliche Kontrollen, situationsadäquate kurzfristige Anpassungen der Medikation, therapeutische Gespräche und diagnosespezifische Psychoedukation sind zwingend notwendig." },
      { id:302, titel:"Keine Verschlechterung – Kurzversion (ohne Empfehlungen)", text:"Derzeit bestehen keine Hinweise darauf, dass bei Einhaltung der Mitwirkungspflichten durch die klagende Partei in absehbarer Zeit (innerhalb der nächsten 18 Monate) mit einer kalkülsrelevanten Verschlechterung des Gesundheitszustandes (fachspezifisch) zu rechnen wäre." },
      { id:303, titel:"Keine Verschlechterung – Empfehlungen bei Bedarf (abgeschwächt)", text:"Derzeit bestehen keine Hinweise darauf, dass bei Einhaltung der Mitwirkungspflichten durch die klagende Partei in absehbarer Zeit (innerhalb der nächsten 18 Monate) mit einer kalkülsrelevanten Verschlechterung des Gesundheitszustandes (fachspezifisch) zu rechnen wäre. Regelmäßige fachärztliche Kontrollen, situationsadäquate kurzfristige Anpassungen der Medikation, therapeutische Gespräche und diagnosespezifische Psychoedukation sind bei Bedarf notwendig." },
      { id:304, titel:"Keine Verschlechterung + kognitive Verhaltenstherapie notwendig", text:"Derzeit bestehen keine Hinweise darauf, dass bei Einhaltung der Mitwirkungspflichten durch die klagende Partei in absehbarer Zeit (innerhalb der nächsten 18 Monate) mit einer kalkülsrelevanten Verschlechterung des Gesundheitszustandes (fachspezifisch) zu rechnen wäre. Regelmäßige fachärztliche Kontrollen, situationsadäquate kurzfristige Anpassungen der Medikation, therapeutische Gespräche und diagnosespezifische Psychoedukation sind zwingend notwendig. Des Weiteren ist eine störungsspezifische kognitive Verhaltenstherapie im Einzel- oder Gruppensetting einschließlich Exposition notwendig." },
      { id:401, titel:"Besserung Depression / subdepressiv – ca. 6 Wochen", text:"Mit einer Verbesserung des depressiven Zustandsbildes ist in ca. 6 Wochen zu rechnen (mit hoher Wahrscheinlichkeit)." },
      { id:402, titel:"Besserung ängstlich-depressiv – ca. 8 Wochen", text:"Durch psychopharmakologische Medikation ist mit einer Verbesserung des ängstlich-depressiven Zustandsbildes in ca. 8 Wochen zu rechnen (mit hoher Wahrscheinlichkeit)." },
      { id:403, titel:"Besserung Schlafstörung / Tag-Nacht-Rhythmus – ca. 1 Woche", text:"Durch Etablierung eines Tag-Nacht-Rhythmus mit psychopharmakologischer Medikation und/oder verhaltenstherapeutischen Maßnahmen ist mit einer Verbesserung der Schlafstörung in ca. 1 Woche zu rechnen (mit sehr hoher Wahrscheinlichkeit)." },
      { id:404, titel:"Besserung gereizt/subdepressiv (Medikamenteneinnahme) – ca. 6 Wochen", text:"Durch Einnahme der verordneten psychopharmakologischen Medikation ist mit einer Verbesserung des gereizt/subdepressiven Zustandsbildes in ca. 6 Wochen zu rechnen (mit hoher Wahrscheinlichkeit)." },
      { id:405, titel:"Suchtspezifische Maßnahmen Alkohol", text:"Suchtspezifische Interventionen hinsichtlich eines schädlichen Alkoholkonsums sollten dem Kläger / der Klägerin regelhaft angeboten werden. Regelmäßige suchtspezifische Kontrollen, die Einhaltung der Abstinenz sowie die Reetablierung der antidepressiven Medikation zur Rückfallprophylaxe sind angezeigt." },
      { id:406, titel:"Besserung Angst/Panik + Depression – ca. 6 Wochen", text:"Durch eine konsequente, leitliniengerechte psychopharmakologische Behandlung mit adäquater Dosistitration und ausreichender Einnahmetreue ist mit einer Besserung des Angst- und Paniksyndroms sowie der depressiven Symptomatik innerhalb von etwa 6 Wochen zu rechnen, wobei eine klinisch relevante Reduktion der subjektiven Belastung mit hoher Wahrscheinlichkeit zu erwarten ist." },
      { id:407, titel:"Besserung durch Medikamentenreduktion (Überdosierung) – 1–2 Wochen", text:"Durch Reduktion des Psychopharmakons [MEDIKAMENT], welches in der Spiegelmessung eine deutliche Überdosierung ergab, ist mit einer Besserung von Unruhezuständen in 1 bis 2 Wochen zu rechnen." },
      { id:408, titel:"Hinweis – Benzodiazepine nicht als Dauermedikation", text:"Benzodiazepine sollten nicht als Dauermedikation verordnet werden. Durch regelmäßige Medikamentenspiegelkontrollen zur Kontrolle der Compliance und zur Dosisfindung kann sich das ängstliche Zustandsbild in ca. 6 Wochen verbessern und dadurch die Benzodiazepinmedikation abgesetzt werden." },
      { id:409, titel:"Besserung Depression + Alkohol – 6 bis 12 Wochen", text:"Durch eine leitliniengerechte psychiatrische Behandlung, insbesondere durch eine konsequent durchgeführte antidepressive Psychopharmakotherapie in adäquater Dosierung sowie begleitende psychotherapeutische Interventionen, ist mit einer relevanten Besserung des depressiven Zustandsbildes zu rechnen. Bei ausreichender Therapieadhärenz ist innerhalb von etwa 6 bis 12 Wochen mit einer klinisch relevanten Reduktion der depressiven Symptomatik zu rechnen, mit hoher Wahrscheinlichkeit. Unter zusätzlicher Durchführung motivierender und kognitiv verhaltenstherapeutischer Interventionen zur Konsumreduktion von Alkohol bis hin zur Abstinenz ist innerhalb von etwa 3 bis 12 Wochen mit einer relevanten Verbesserung der Gesamtbelastung zu rechnen." },
      { id:410, titel:"Besserung Zwangsstörung – Verhaltenstherapie ca. 12 Wochen", text:"Verbesserungsmöglichkeiten sind vor allem durch verhaltenstherapeutische Maßnahmen innerhalb von etwa 12 Wochen zu erwarten. Es sollte eine störungsspezifische kognitive Verhaltenstherapie im Einzel- oder Gruppensetting einschließlich Exposition durchgeführt werden. Durch die Kombination einer Anpassung der psychopharmakologischen Medikation mit verhaltenstherapeutischen Interventionen sowie Exposition im Rahmen beruflicher Tätigkeit ist mit einer weiteren Reduktion der gegenwärtig noch ausgeschlossenen Tätigkeiten zu rechnen." },
      { id:411, titel:"Besserung subdepressiv + Nikotin (Bupropion) – 8 bis 12 Wochen", text:"Unter gezielter kardiologischer Beobachtung kann aus psychiatrischer Sicht eine antidepressive Medikation mit Bupropion begonnen werden. Als Nebeneffekt reduziert diese Medikation das Rauchverlangen. Eine suchtspezifische verhaltenstherapeutische Therapie hinsichtlich der Nikotinabhängigkeit erscheint sinnvoll. Durch die genannten Maßnahmen und eine begleitende Schlafhygiene, unterstützt durch kognitiv verhaltenstherapeutische Maßnahmen und Psychoedukation, ist mit einer Verbesserung des Zustandsbildes in etwa 8 bis 12 Wochen zu rechnen." },
      { id:412, titel:"Besserung ADHS-Symptomatik (Medikamenteneinnahme) – ca. 1 Woche", text:"Durch Einnahme der verordneten psychopharmakologischen Medikation ist mit einer Verbesserung der ADHS-Symptomatik in ca. einer Woche zu rechnen (mit hoher Wahrscheinlichkeit). Durch Etablierung eines Tag-Nacht-Rhythmus und rechtzeitige Einnahme der verordneten psychopharmakologischen Medikation und verhaltenstherapeutische Maßnahmen ist mit einer Verbesserung der Schlafstörungen und Tagesmüdigkeit in ca. 1–2 Wochen zu rechnen (mit sehr hoher Wahrscheinlichkeit)." },
      { id:413, titel:"Compliance-Kontrolle – Medikamentenspiegel, Blisterkontrolle, Apotheken-Protokoll", text:"Eine Kontrolle der Einnahmetreue kann konkret durch wiederholte, zeitnah zur angegebenen Einnahme terminierte Medikamentenspiegelkontrollen im Serum erfolgen, bei Bedarf auch unangekündigt und in kurzen Abständen, um eine regelmäßige Einnahme plausibel zu belegen. Zusätzlich kann die Einnahmetreue durch eine dokumentierte Tablettenabgabe mit Blisterkontrolle, Tablettenzählung und Apotheken-Abgabeprotokollen objektiviert werden, ergänzt durch einen standardisierten Medikationsplan mit Datum, Uhrzeit und Dosis." },
      { id:414, titel:"Besserung ängstlich-depressiv (Medikamentenadaptierung) – ca. 12 Wochen", text:"Durch eine Adaptierung oder Umstellung der psychopharmakologischen Medikation ist mit hoher Wahrscheinlichkeit innerhalb von etwa 12 Wochen mit einer Besserung der beklagten ängstlich-depressiven Symptomatik zu rechnen." },
      { id:415, titel:"Besserung Agoraphobie – KVT mit Exposition, ca. 2–3 Wochen", text:"Bei agoraphobischem Vermeidungsverhalten wird eine kognitive Verhaltenstherapie mit Exposition empfohlen, idealerweise als intensives Setting mit täglichen Expositionen über ein bis zwei Wochen. Die Behandlung beginnt mit Psychoedukation über Angstreaktionen, typische Paniksymptome sowie den Kreislauf aus Vermeidung und kurzfristiger Erleichterung. Im Rahmen von In-vivo-Expositionen erfolgen schrittweise geplante Konfrontationen mit gefürchteten Situationen (z.B. öffentliche Verkehrsmittel, Einkaufsläden, Menschenmengen). Unter dieser Vorgehensweise ist mit einer Verbesserung des Vermeidungsverhaltens innerhalb von etwa zwei bis drei Wochen mit hoher Wahrscheinlichkeit zu rechnen." },
      { id:501, titel:"Keine weiteren Sachverständigen notwendig", text:"Bei der heutigen Untersuchung ergaben sich keine Hinweise auf die Notwendigkeit der Beiziehung weiterer Sachverständiger als die vom Gericht bereits bestellten." },
      { id:502, titel:"Internistischer Sachverständiger bereits angeregt", text:"Die Hinzuziehung einer/eines internistischen Sachverständigen wurde im Hinblick auf [GRUND] bereits angeregt." },
      { id:503, titel:"Weitere Sachverständige empfohlen (mehrere Fachgebiete)", text:"Aufgrund der somatischen Beschwerden wird die Beiziehung weiterer Sachverständiger aus dem Bereich [FACHGEBIET 1], [FACHGEBIET 2] sowie [FACHGEBIET 3] empfohlen." },
      { id:601, titel:"Keine leidensbedingten Krankenstände zu erwarten", text:"Unter Einhaltung des Leistungskalküls sind keine leidensbedingten Krankenstände zu erwarten." }
    ];
    renderAnzeige();
  }

  function getBausteinById(id) {
    return bausteine.find(b => b.id === id);
  }

  function renderAnzeige() {
    const liste = document.getElementById("baustein-list");
    const suche = suchbegriff.toLowerCase();

    if (suche) {
      const gefiltert = bausteine.filter(b =>
        b.titel.toLowerCase().includes(suche) ||
        b.text.toLowerCase().includes(suche)
      );
      if (gefiltert.length === 0) {
        liste.innerHTML = '<p class="no-results">Keine Bausteine gefunden.</p>';
        return;
      }
      liste.innerHTML = gefiltert.map(b => {
        const preview = b.text.replace(/\n/g, " ").substring(0, 100) + "…";
        const sel = selectedId === b.id ? " selected" : "";
        return `<div class="baustein-card${sel}" data-id="${b.id}" onclick="bausteinWaehlen(${b.id})">
          <div class="baustein-titel">${b.titel}</div>
          <div class="baustein-preview">${preview}</div>
        </div>`;
      }).join("");
      return;
    }

    // Zweistufiges Accordion
    let html = "";
    struktur.forEach(kat => {
      const katOpen = offeneKats.has(kat.key);
      const totalCount = kat.subs.reduce((sum, s) => sum + s.ids.length, 0);
      html += `<div class="kat-group">
        <div class="kat-header${katOpen ? " open" : ""}" onclick="toggleKat('${kat.key}')">
          <div class="kat-header-left">
            <span class="kat-num">${kat.nr}.</span>
            <span class="kat-title">${kat.titel}</span>
            ${totalCount > 0 ? `<span class="kat-count">(${totalCount})</span>` : ""}
          </div>
          <span class="kat-arrow">▼</span>
        </div>
        <div class="kat-body${katOpen ? " open" : ""}">`;

      if (kat.subs.length === 0) {
        html += `<div class="empty-hint">Noch keine Bausteine vorhanden.</div>`;
      } else {
        kat.subs.forEach(sub => {
          const subOpen = offeneSubs.has(sub.key);
          const bausteineListe = sub.ids.map(id => getBausteinById(id)).filter(Boolean);
          html += `<div class="sub-group">
            <div class="sub-header${subOpen ? " open" : ""}" onclick="toggleSub('${sub.key}')">
              <div class="sub-header-left">
                <span class="sub-title">${sub.titel}</span>
                <span class="sub-count">(${bausteineListe.length})</span>
              </div>
              <span class="sub-arrow">▼</span>
            </div>
            <div class="sub-body${subOpen ? " open" : ""}">`;
          bausteineListe.forEach(b => {
            const preview = b.text.replace(/\n/g, " ").substring(0, 90) + "…";
            const sel = selectedId === b.id ? " selected" : "";
            html += `<div class="baustein-card${sel}" data-id="${b.id}" onclick="bausteinWaehlen(${b.id})">
              <div class="baustein-titel">${b.titel}</div>
              <div class="baustein-preview">${preview}</div>
            </div>`;
          });
          html += `</div></div>`;
        });
      }
      html += `</div></div>`;
    });
    liste.innerHTML = html;
  }

  function toggleKat(key) {
    offeneKats.has(key) ? offeneKats.delete(key) : offeneKats.add(key);
    renderAnzeige();
  }

  function toggleSub(key) {
    offeneSubs.has(key) ? offeneSubs.delete(key) : offeneSubs.add(key);
    renderAnzeige();
  }

  function bausteinWaehlen(id) {
    selectedId = id;
    document.querySelectorAll(".baustein-card").forEach(c => {
      c.classList.toggle("selected", parseInt(c.dataset.id) === id);
    });
    aktionButtons(true);
  }

  function aktionButtons(aktiv) {
    document.getElementById("btn-einfuegen").disabled = !aktiv;
    document.getElementById("btn-vorschau").disabled = !aktiv;
  }

  function vorschauZeigen() {
    const b = bausteine.find(x => x.id === selectedId);
    if (!b) return;
    document.getElementById("vorschau-titel").textContent = b.titel;
    document.getElementById("vorschau-text").textContent = b.text;
    document.getElementById("vorschau-overlay").classList.add("open");
  }

  function vorschauSchliessen() {
    document.getElementById("vorschau-overlay").classList.remove("open");
  }

  async function inWordEinfuegen() {
    const b = bausteine.find(x => x.id === selectedId);
    if (!b) return;
    try {
      await Word.run(async ctx => {
        const sel = ctx.document.getSelection();
        sel.insertText(b.text, "Replace");
        sel.font.color = "#FF0000";
        await ctx.sync();
      });
      toast("✓ Baustein eingefügt");
    } catch(e) {
      toast("Demo: Baustein würde eingefügt");
    }
  }

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  document.getElementById("search-input").addEventListener("input", e => {
    suchbegriff = e.target.value.toLowerCase();
    selectedId = null;
    aktionButtons(false);
    renderAnzeige();
  });

  document.getElementById("btn-vorschau").addEventListener("click", vorschauZeigen);
  document.getElementById("btn-einfuegen").addEventListener("click", inWordEinfuegen);
  document.getElementById("vorschau-close").addEventListener("click", vorschauSchliessen);
  document.getElementById("vorschau-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("vorschau-overlay")) vorschauSchliessen();
  });

  document.getElementById("baustein-list").addEventListener("dblclick", e => {
    const card = e.target.closest(".baustein-card");
    if (card) inWordEinfuegen();
  });

  if (typeof Office !== "undefined") {
    Office.onReady(() => ladeBausteine());
  } else {
    ladeBausteine();
  }
</script>
</body>
</html>
